site_name: marp2video
site_description: Convert Marp presentations to videos with AI voiceovers
site_url: https://grokify.github.io/marp2video
repo_url: https://github.com/grokify/marp2video
repo_name: grokify/marp2video

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
    - Requirements: getting-started/requirements.md
  - User Guide:
    - Complete Workflow: guide/complete-workflow.md
    - Pipeline Overview: guide/pipeline.md
    - Voiceover Formats: guide/voiceover-formats.md
    - Subtitle Generation: guide/subtitles.md
    - Multi-Language Support: guide/multi-language.md
    - Output Options: guide/output-options.md
    - Customization: guide/customization.md
  - Reference:
    - CLI Reference: reference/cli.md
    - Transcript Schema: reference/transcript-schema.md
    - Voice Settings: reference/voice-settings.md
  - Examples:
    - Overview: examples/index.md
    - Intro Presentation: examples/intro.md
  - Development:
    - Architecture: development/architecture.md
    - Contributing: development/contributing.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/grokify/marp2video
